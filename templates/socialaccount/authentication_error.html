{% extends "base.html" %}
{% block title %}Login Error — CIO Manager{% endblock %}

{% block body %}
<div class="login-wrapper">
    <div class="login-bg-orb orb-1"></div>
    <div class="login-bg-orb orb-2"></div>
    <div class="login-bg-orb orb-3"></div>

    <div class="login-card">
        <div style="width:60px;height:60px;border-radius:50%;background:rgba(248,113,113,0.1);color:var(--danger);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.6rem;border:1px solid rgba(248,113,113,0.15);">
            <i class="bi bi-exclamation-triangle-fill"></i>
        </div>

        <h1 style="font-family:'Outfit',sans-serif;font-weight:800;font-size:1.4rem;color:var(--text-primary);margin-bottom:0.5rem;">Login Failed</h1>
        <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:2rem;">
            An error occurred while attempting to sign in with your third-party account. Please try again.
        </p>

        <a href="/accounts/login/" class="btn-google w-100 justify-content-center">
            <i class="bi bi-arrow-left" style="font-size:1rem;"></i>
            Back to Sign In
        </a>
    </div>
</div>
{% endblock %}
