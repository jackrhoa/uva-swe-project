{% extends "base.html" %}
{% block title %}Complete Sign Up — CIO Manager{% endblock %}

{% block body %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h1 class="login-title">Complete Sign Up</h1>
            <p class="login-subtitle">Confirm your details to finish signing in with Google.</p>
        </div>
        <form method="post" action="{% url 'socialaccount_signup' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-google w-100 justify-content-center">Complete Sign Up</button>
        </form>
    </div>
</div>
{% endblock %}
