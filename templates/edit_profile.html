{% extends "base.html" %}
{% block title %}Edit Profile — CIO Manager{% endblock %}

{% block content %}
<div class="page-header animate-in delay-1">
    <h1>Edit Profile</h1>
    <p class="page-subtitle">Update the name shown on your profile</p>
</div>

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 animate-in delay-2">
        <div class="glass-card">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="{{ form.first_name.id_for_label }}" class="form-label">First Name</label>
                    {{ form.first_name }}
                </div>

                <div class="mb-3">
                    <label for="{{ form.last_name.id_for_label }}" class="form-label">Last Name</label>
                    {{ form.last_name }}
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Save Changes
                    </button>
                    <a href="{% url 'profile' %}" class="btn btn-outline-light">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
