{% extends "base.html" %}
{% block title %}Attendance Records — CIO Manager{% endblock %}

{% block extra_css %}
<style>
/* ── Page header row ── */
.records-header-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 0;
}
.records-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-color);
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    white-space: nowrap;
}
.records-back-btn:hover {
    background: var(--border-color);
    color: var(--text-primary);
    border-color: var(--border-hover);
}

/* ── Filter + CSV bar ── */
.att-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
}
.att-filter-select {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    border-radius: 8px;
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
}
.att-filter-select:focus {
    border-color: var(--accent-2);
}
.att-csv-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-family: 'Outfit', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    white-space: nowrap;
    margin-left: auto;
}
.att-csv-btn:hover {
    background: var(--border-color);
    color: var(--text-primary);
    border-color: var(--border-hover);
}

/* ── Table ── */
.att-records-table-wrap {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--border-color);
}
.att-records-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
}
.att-records-table th {
    font-family: 'Outfit', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 10px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border-color);
    white-space: nowrap;
    background: var(--bg-elevated);
}
.att-records-table td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-secondary);
    vertical-align: middle;
}
.att-records-table tr:last-child td {
    border-bottom: none;
}
.att-records-table tr:hover td {
    background: rgba(255,255,255,0.02);
}
.att-user-icon {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--gradient-subtle);
    border: 1px solid var(--border-color);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'Outfit', sans-serif;
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--text-secondary);
    flex-shrink: 0;
}
.att-code-cell {
    font-family: 'Outfit', monospace;
    font-weight: 700;
    letter-spacing: 0.14em;
    font-size: 0.82rem;
    color: var(--text-primary);
}
.att-result-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
    white-space: nowrap;
}
.att-result-badge.success {
    background: rgba(34,197,94,.12);
    border-color: rgba(34,197,94,.35);
    color: #4ade80;
}
.att-result-badge.failed {
    background: rgba(239,68,68,.1);
    border-color: rgba(239,68,68,.3);
    color: #f87171;
}
html[data-theme="light"] .att-result-badge.success {
    background: rgba(22,163,74,.1);
    border-color: rgba(22,163,74,.3);
    color: #16a34a;
}
html[data-theme="light"] .att-result-badge.failed {
    background: rgba(220,38,38,.08);
    border-color: rgba(220,38,38,.3);
    color: #dc2626;
}
.att-no-records {
    text-align: center;
    color: var(--text-muted);
    font-style: italic;
    font-size: 0.82rem;
    padding: 32px 16px;
}
</style>
{% endblock %}

{% block content %}
<div class="page-header animate-in delay-1">
    <div class="records-header-row">
        <a href="{% url 'exec_dashboard' %}" class="records-back-btn">
            <i class="bi bi-chevron-left"></i> Back
        </a>
        <h1 style="margin:0;">Attendance Records</h1>
    </div>
</div>

<div class="row g-3">
    <div class="col-12 animate-in delay-2">
        <div class="glass-card">

            <div class="att-toolbar">
                <select class="att-filter-select" id="attFilterTeam">
                    <option value="">All Teams</option>
                    {% for team in all_teams %}
                    <option value="{{ team.id }}"
                        {% if selected_team == team.id|stringformat:"s" %}selected{% endif %}>
                        {{ team.name }}{% if team == profile.team %} (your team){% endif %}
                    </option>
                    {% endfor %}
                </select>

                <select class="att-filter-select" id="attFilterResult">
                    <option value="all" {% if selected_result == "all" or not selected_result %}selected{% endif %}>All Attempts</option>
                    <option value="success" {% if selected_result == "success" %}selected{% endif %}>Successful Attempts</option>
                    <option value="fail" {% if selected_result == "fail" %}selected{% endif %}>Failed Attempts</option>
                </select>

                <a href="#" class="att-csv-btn" id="attCsvBtn">
                    <i class="bi bi-download"></i> Download CSV
                </a>
            </div>

            <div class="att-records-table-wrap">
                <table class="att-records-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Name</th>
                            <th>Team</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Code Entered</th>
                            <th>Result</th>
                        </tr>
                    </thead>
                    <tbody id="attRecordsTbody">
                        <tr><td colspan="7" class="att-no-records">Loading…</td></tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const attFilterTeam   = document.getElementById('attFilterTeam');
    const attFilterResult = document.getElementById('attFilterResult');
    const attRecordsTbody = document.getElementById('attRecordsTbody');
    const attCsvBtn       = document.getElementById('attCsvBtn');

    // Load records from JSON API then render
    async function loadRecords() {
        attRecordsTbody.innerHTML = '<tr><td colspan="7" class="att-no-records">Loading…</td></tr>';
        const team   = attFilterTeam.value;
        const result = attFilterResult.value;
        const url    = `{% url 'attendance_records' %}?team=${encodeURIComponent(team)}&result=${encodeURIComponent(result)}`;
        try {
            const resp = await fetch(url);
            const data = await resp.json();
            if (!data.ok || data.rows.length === 0) {
                attRecordsTbody.innerHTML = '<tr><td colspan="7" class="att-no-records">No records found.</td></tr>';
                return;
            }
            attRecordsTbody.innerHTML = data.rows.map(row => `
                <tr>
                    <td><div class="att-user-icon">${row.initial}</div></td>
                    <td style="color:var(--text-primary);font-weight:600;">${row.name}</td>
                    <td>${row.team}</td>
                    <td>${row.date}</td>
                    <td>${row.time}</td>
                    <td><span class="att-code-cell">${row.code}</span></td>
                    <td>
                        <span class="att-result-badge ${row.result}">
                            ${row.result === 'success'
                                ? '<i class="bi bi-check-circle-fill"></i> Success'
                                : '<i class="bi bi-x-circle-fill"></i> Failed'}
                        </span>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            attRecordsTbody.innerHTML = '<tr><td colspan="7" class="att-no-records">Error loading records.</td></tr>';
        }
    }

    attFilterTeam.addEventListener('change', loadRecords);
    attFilterResult.addEventListener('change', loadRecords);

    // CSV download — points at the CSV endpoint with current filters
    function updateCsvLink() {
        const team   = attFilterTeam.value;
        const result = attFilterResult.value;
        attCsvBtn.href = `{% url 'attendance_records_csv' %}?team=${encodeURIComponent(team)}&result=${encodeURIComponent(result)}`;
    }

    attFilterTeam.addEventListener('change', updateCsvLink);
    attFilterResult.addEventListener('change', updateCsvLink);

    // Init
    loadRecords();
    updateCsvLink();

});
</script>
{% endblock %}
